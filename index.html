<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen Modulo</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0;">
</head>

<body>
    <div id="color_azul"></div>
    
    <div id="cuadrado_blanco">
        <div class="centrado">
            <img class="qr_what" src="img/qr.jpg" alt="qr pagina web">
            <h1>WhatsApp</h1>
            <p id="bajo_h1">Usa WhatsApp en tu teléfono para escanear el código</p>
            <form action="" method="post" id="formulario">
                <label for="usuario"><h3>Usuario</h3></label>
                <input type="text" name="Usuario" id="usuario">
                <label for="contra"><h3>Contraseña</h3></label>
                <input type="password" name="Contraseña" id="contra">
                <button type="submit">enviar</button>
            </form>
            <p id="bajo_formulario">Para reducir el consumo de datos móviles, conecta tu teléfono a una red Wi-Fi</p>
            
            
            
           <div class="orden_iconos">
                 <div class="color_verde_iconos"></div>
                <h5>Android</h5>
                <p>Abre WhatsApp - Menú - WhatsApp Web</p>
           </div> 
           <div class="orden_iconos">
                 <div class="color_verde_iconos_2"></div>
                <h5>Iphone</h5>
                <p>Abre WhatsApp - Configuración - WhatsApp Web</p>
           </div>
           <div class="orden_iconos">
                 <div class="color_verde_iconos_3"></div>
                <h5>Windows Phone</h5>
                <p>Abre WhatsApp - Menú - WhatsApp Web</p>
           </div>
            
        </div>
    </div>
    


<script src="app.js"></script>

    
</body></html>
